<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finova AI — Personal Finance Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06091A;--bg2:#0B0F22;--bg3:#101528;--bg4:#151B30;
  --border:#1C2540;--border2:#243060;
  --text:#DDE6F5;--text2:#8A9AC0;--text3:#4E627A;
  --green:#00C27C;--green2:#00E896;--gdim:rgba(0,194,124,.12);--gbg:#041510;
  --blue:#4F8EF7;--amber:#F5A623;--red:#FF6B6B;--purple:#A78BFA;--pink:#F472B6;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --r:14px;--r-sm:9px;
  --ff:'Sora',sans-serif;--ff-mono:'DM Mono',monospace;--ff-serif:'Lora',Georgia,serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ff);overflow:hidden}
#root{display:flex;flex-direction:column;height:100vh}

/* Key Modal */
.key-overlay{position:fixed;inset:0;z-index:1000;background:rgba(6,9,26,.95);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center}
.key-modal{background:var(--bg3);border:1px solid var(--border2);border-radius:22px;padding:38px 34px;width:min(490px,94vw);box-shadow:var(--shadow),0 0 80px rgba(66,133,244,.07)}
.key-logo{display:flex;align-items:center;gap:13px;margin-bottom:26px}
.key-logo-mark{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--green),#00a86b);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#000}
.key-logo-text{font-size:23px;font-weight:800;letter-spacing:-.02em}
.key-logo-text span{color:var(--green)}
.key-title{font-size:17px;font-weight:700;margin-bottom:9px}
.key-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:18px}
.key-desc a{color:#93c5fd;text-decoration:none;font-weight:500}
.key-desc a:hover{text-decoration:underline}
.gem-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(66,133,244,.08);border:1px solid rgba(66,133,244,.2);border-radius:20px;padding:4px 12px;font-size:11px;font-family:var(--ff-mono);color:#93c5fd;margin-bottom:18px;letter-spacing:.04em}
.gdots{display:flex;gap:3px;align-items:center}
.gd{width:7px;height:7px;border-radius:50%}
.key-steps{margin-bottom:20px;padding:14px 16px;background:rgba(66,133,244,.05);border:1px solid rgba(66,133,244,.12);border-radius:10px}
.key-step{display:flex;align-items:flex-start;gap:9px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.key-step:last-child{margin-bottom:0}
.key-step-n{width:18px;height:18px;border-radius:50%;background:rgba(66,133,244,.18);color:#93c5fd;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.key-input-wrap{position:relative;margin-bottom:18px}
.key-input{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:14px 48px 14px 17px;font-size:13px;color:var(--text);font-family:var(--ff-mono);outline:none;letter-spacing:.03em;transition:border-color .2s,box-shadow .2s}
.key-input:focus{border-color:#4F8EF7;box-shadow:0 0 0 3px rgba(79,142,247,.1)}
.key-input::placeholder{color:var(--text3);font-family:var(--ff);letter-spacing:0}
.key-eye{position:absolute;right:15px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px;transition:color .15s}
.key-eye:hover{color:var(--text)}
.key-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4F8EF7,#2563eb);border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;color:#fff;font-family:var(--ff);cursor:pointer;transition:all .2s;letter-spacing:.02em}
.key-btn:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 4px 20px rgba(79,142,247,.3)}
.key-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.key-note{margin-top:16px;font-size:11px;color:var(--text3);text-align:center;line-height:1.7;font-family:var(--ff-mono)}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:56px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--green),#00a86b);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#000}
.logo-name{font-size:17px;font-weight:800;letter-spacing:-.02em}
.logo-name span{color:var(--green)}
.header-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.badge{font-family:var(--ff-mono);font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;border:1px solid;letter-spacing:.06em;white-space:nowrap}
.badge-green{color:var(--green);border-color:rgba(0,194,124,.3);background:rgba(0,194,124,.07)}
.badge-gemini{display:inline-flex;align-items:center;gap:5px;font-family:var(--ff-mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid rgba(79,142,247,.3);background:rgba(79,142,247,.07);color:#93c5fd;letter-spacing:.04em}
.health-badge{display:flex;align-items:center;gap:5px;font-family:var(--ff-mono);font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid;letter-spacing:.04em;font-weight:500}
.cog-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.cog-btn:hover{color:var(--text);border-color:#4F8EF7}

/* Tabs */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 22px;flex-shrink:0;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 16px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:all .18s;text-transform:uppercase;letter-spacing:.06em;user-select:none;white-space:nowrap}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab:hover:not(.active){color:var(--text)}

/* Body */
.body{flex:1;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:14px 11px;overflow-y:auto;display:flex;flex-direction:column;gap:9px}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.health-widget{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.health-ring{position:relative;width:72px;height:72px;margin:0 auto 7px}
.health-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--ff-mono);font-size:18px;font-weight:500}
.hlbl{font-family:var(--ff-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.hgrade{font-size:11px;font-weight:600;margin-top:2px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.mlbl{font-family:var(--ff-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.mval{font-family:var(--ff-mono);font-size:20px;font-weight:500;line-height:1}
.msub{font-size:10.5px;color:var(--text2);margin-top:5px}
.mprog{height:2px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.mfill{height:100%;border-radius:2px;transition:width .5s}
.mg .mval{color:var(--green)}.ma .mval{color:var(--amber)}.mr .mval{color:var(--red)}
.donut-wrap{display:flex;justify-content:center;padding:6px 0}
.cats-lbl{font-family:var(--ff-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);border-top:1px solid var(--border);padding-top:11px}
.cat-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:11.5px;color:var(--text2);flex:1}
.cat-amt{font-family:var(--ff-mono);font-size:11px;color:var(--text)}

/* Chat */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.no-key-banner{margin:14px 20px;background:rgba(66,133,244,.07);border:1px solid rgba(66,133,244,.22);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px}
.no-key-banner span{font-size:12.5px;color:#93c5fd;flex:1;line-height:1.5}
.no-key-banner button{background:#4F8EF7;border:none;border-radius:var(--r-sm);padding:7px 14px;font-size:12px;font-weight:700;color:#fff;font-family:var(--ff);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:filter .15s}
.no-key-banner button:hover{filter:brightness(1.1)}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.msg{display:flex;gap:10px}
.msg.ai{align-self:flex-start;max-width:86%}
.msg.usr{align-self:flex-end;max-width:86%;flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:8px;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.msg.ai .avatar{background:var(--gbg);border:1px solid rgba(0,194,124,.35);color:var(--green)}
.msg.usr .avatar{background:#0F102E;border:1px solid rgba(79,142,247,.35);color:var(--blue)}
.bubble{padding:12px 16px;border-radius:13px;font-size:13.5px;line-height:1.74}
.msg.ai .bubble{background:var(--bg3);border:1px solid var(--border2);font-family:var(--ff-serif);color:var(--text);border-radius:3px 13px 13px 13px}
.msg.usr .bubble{background:#0C0D2A;border:1px solid rgba(79,142,247,.2);font-family:var(--ff);font-size:13px;color:var(--text);border-radius:13px 3px 13px 13px}
.bubble strong{color:var(--green2);font-weight:600;font-family:var(--ff)}
.bubble em{color:var(--text2);font-style:italic}
.bubble ul,.bubble ol{padding-left:20px;margin:8px 0}
.bubble li{margin-bottom:5px}
.bubble p{margin-bottom:8px}
.bubble p:last-child{margin-bottom:0}
.bubble code{font-family:var(--ff-mono);font-size:12px;background:var(--bg2);padding:1px 6px;border-radius:4px;color:var(--amber)}
.bubble h3,.bubble h4{font-family:var(--ff);font-weight:700;color:var(--text);margin:12px 0 5px;font-size:14px}
.bubble blockquote{border-left:3px solid var(--green);padding:6px 12px;margin:10px 0;background:var(--gbg);border-radius:0 8px 8px 0;font-style:italic;color:var(--text2)}
.typing{display:flex;gap:5px;align-items:center;padding:5px 2px}
.dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:bounce 1.3s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:1}30%{transform:translateY(-7px);opacity:.6}}
.streaming-cursor::after{content:'▌';color:var(--green);animation:blink .7s steps(1) infinite;font-family:var(--ff-mono);font-size:13px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.qp-bar{padding:0 20px 12px;display:flex;gap:7px;flex-wrap:wrap}
.qp{font-size:11.5px;padding:5px 12px;border:1px solid var(--border2);border-radius:20px;background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.qp:hover{border-color:var(--green);color:var(--green);background:var(--gdim)}
.input-bar{padding:12px 20px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:9px;align-items:center}
.chat-input{flex:1;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;padding:11px 15px;font-size:13.5px;color:var(--text);font-family:var(--ff);outline:none;transition:border-color .18s}
.chat-input:focus{border-color:var(--green)}
.chat-input::placeholder{color:var(--text3)}
.chat-input:disabled{opacity:.6}
.send-btn{background:linear-gradient(135deg,var(--green),#00a86b);border:none;border-radius:11px;width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s}
.send-btn:hover:not(:disabled){filter:brightness(1.1);transform:scale(1.05)}
.send-btn:disabled{background:var(--border);cursor:not-allowed}

/* Panel */
.panel{flex:1;overflow-y:auto;padding:18px 20px}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:16px}
.card-title{font-size:10px;font-weight:600;color:var(--green);font-family:var(--ff-mono);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}

/* Expenses */
.add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.in{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:9px 12px;font-size:13px;color:var(--text);font-family:var(--ff);outline:none;transition:border-color .15s}
.in:focus{border-color:var(--green)}
.in::placeholder{color:var(--text3)}
.in-desc{flex:2;min-width:130px}.in-amt{flex:1;min-width:100px}
select.in{cursor:pointer;background:var(--bg2)}
.add-btn{background:linear-gradient(135deg,var(--green),#00a86b);border:none;border-radius:var(--r-sm);padding:9px 20px;font-size:13px;color:#000;font-family:var(--ff);font-weight:700;cursor:pointer;transition:filter .15s;white-space:nowrap}
.add-btn:hover{filter:brightness(1.1)}
.exp-list-hd{font-family:var(--ff-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.exp-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;transition:border-color .15s,background .15s}
.exp-item:hover{border-color:var(--border2);background:var(--bg4)}
.exp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.exp-desc{flex:1;font-size:13px;color:var(--text)}
.exp-tag{font-size:10px;color:var(--text2);background:var(--bg2);padding:2px 9px;border-radius:20px;font-family:var(--ff-mono);border:1px solid var(--border);white-space:nowrap}
.exp-date{font-size:10.5px;color:var(--text3);font-family:var(--ff-mono)}
.exp-amt{font-family:var(--ff-mono);font-size:13px;font-weight:500;color:var(--amber);min-width:80px;text-align:right}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:19px;transition:color .15s;padding:0 2px;line-height:1}
.del-btn:hover{color:var(--red)}
.export-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);padding:4px 12px;font-size:10px;font-family:var(--ff-mono);color:var(--text2);cursor:pointer;transition:all .15s;letter-spacing:.06em}
.export-btn:hover{color:var(--green);border-color:var(--green)}

/* Budget */
.inc-row{display:flex;align-items:center;gap:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:18px}
.inc-lbl{font-size:13px;color:var(--text2);flex:1}
.inc-input{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:8px 13px;font-size:15px;color:var(--text);font-family:var(--ff-mono);font-weight:500;outline:none;width:155px;text-align:right;transition:border-color .18s}
.inc-input:focus{border-color:var(--green)}
.rule-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.rule-lbl{font-size:13px;color:var(--text)}
.rule-pct{font-family:var(--ff-mono);font-size:12px}
.rule-bar{height:5px;background:var(--bg2);border-radius:5px;margin-bottom:7px;overflow:hidden}
.rule-fill{height:100%;border-radius:5px;transition:width .65s}
.rule-vals{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text3);font-family:var(--ff-mono);margin-bottom:16px}
.hint{background:var(--gbg);border:1px solid rgba(0,194,124,.2);border-radius:10px;padding:13px 15px;margin-top:4px}
.hint p{font-size:13px;color:#86efac;line-height:1.7;font-family:var(--ff-serif)}
.warn{background:#160E01;border:1px solid rgba(245,166,35,.2);border-radius:10px;padding:13px 15px;margin-top:4px}
.warn p{font-size:13px;color:#fcd34d;line-height:1.7;font-family:var(--ff-serif)}
.deficit{background:#180505;border:1px solid rgba(255,107,107,.2);border-radius:10px;padding:13px 15px;margin-top:4px}
.deficit p{font-size:13px;color:#fca5a5;line-height:1.7;font-family:var(--ff-serif)}
.alloc-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.alloc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alloc-name{font-size:13px;color:var(--text2);flex:1}
.alloc-val{font-family:var(--ff-mono);font-size:12px;color:var(--text)}

/* Goals */
.goal-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;margin-bottom:12px;transition:border-color .15s}
.goal-card:hover{border-color:var(--border2)}
.goal-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.goal-icon{font-size:20px;line-height:1}
.goal-name{font-size:13.5px;font-weight:600;color:var(--text);flex:1}
.goal-pct{font-family:var(--ff-mono);font-size:12px}
.goal-bar{height:6px;background:var(--bg2);border-radius:6px;overflow:hidden;margin-bottom:8px}
.goal-fill{height:100%;border-radius:6px;transition:width .7s}
.goal-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-family:var(--ff-mono)}
.goal-meta span:last-child{color:var(--text2)}
.goal-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.gadd-btn{background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:5px 11px;font-size:11px;color:var(--text2);font-family:var(--ff);cursor:pointer;transition:all .15s}
.gadd-btn:hover{color:var(--green);border-color:var(--green)}
.gdel-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:11px;color:var(--text3);font-family:var(--ff);cursor:pointer;transition:all .15s}
.gdel-btn:hover{color:var(--red);border-color:rgba(255,107,107,.3)}
.goal-form{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:16px 18px;margin-bottom:16px}
.gform-title{font-size:10px;font-weight:600;color:var(--green);font-family:var(--ff-mono);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.gform-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.cswatch{width:20px;height:20px;border-radius:50%;cursor:pointer;transition:transform .15s;flex-shrink:0}
.cswatch:hover{transform:scale(1.2)}
.cswatch.sel{outline:2px solid white;outline-offset:2px}

/* Analytics */
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-val{font-family:var(--ff-mono);font-size:22px;font-weight:500;margin:4px 0}
.stat-lbl{font-size:10.5px;color:var(--text2)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-cat{font-size:11px;color:var(--text2);width:84px;flex-shrink:0}
.bar-track{flex:1;height:14px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .65s}
.bar-val{font-family:var(--ff-mono);font-size:10.5px;color:var(--text3);min-width:68px;text-align:right}
.trend-wrap{display:flex;align-items:flex-end;gap:8px;height:90px;padding:0 4px}
.tcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}

function getCtx(q){
  const l=q.toLowerCase(),c=[];
  if(/tax|80c|80d|hra|itr|deduct|regime|tds|ltcg|stcg/.test(l))c.push(KB.tax);
  if(/rbi|fd|fixed|savings account|interest|upi|repo|ppf|sukanya/.test(l))c.push(KB.rbi);
  if(/invest|sip|mutual|elss|ppf|nps|equity|nifty|gold|sgb/.test(l))c.push(KB.invest);
  if(/budget|50.30|plan|allocat|emi|rule|emergency|fire/.test(l))c.push(KB.budget);
  if(/save|saving|cut|tip|advice|cashback|spend|reduce/.test(l))c.push(KB.save);
  return c.length?c.join('\n'):KB.budget+'\n'+KB.save;
}

function calcHealth(sP,income,totalExp,cats){
  let s=0;
  s+=sP>=30?35:sP>=20?26:sP>=10?15:sP>=0?5:0;
  const er=income>0?totalExp/income:1;
  s+=er<=0.5?25:er<=0.7?18:er<=0.85?10:er<=1?3:0;
  const nd=cats.filter(x=>['Bills','Food','Transport','Health'].includes(x.c)).reduce((a,x)=>a+x.total,0);
  const np=income>0?(nd/income)*100:100;
  s+=np<=30?20:np<=40?14:np<=50?7:0;
  const wn=cats.filter(x=>['Shopping','Entertainment'].includes(x.c)).reduce((a,x)=>a+x.total,0);
  const wp=income>0?(wn/income)*100:100;
  s+=wp<=10?10:wp<=20?7:wp<=30?3:0;
  if(income>0)s+=10;
  return Math.min(100,Math.max(0,s));
}
function hGrade(sc){
  if(sc>=80)return{label:'Excellent',color:'#00C27C'};

  if(sc>=45)return{label:'Fair',color:'#F5A623'};
  return{label:'Needs Attention',color:'#FF6B6B'};
}

function parseMd(text){
  if(!text)return[];
  const lines=text.split('\n'),out=[];let buf=[],bt='ul';
  const flush=()=>{if(!buf.length)return;out.push(React.createElement(bt,{key:'l'+out.length},buf.map((x,i)=>React.createElement('li',{key:i},inl(x)))));buf=[]};
  const inl=s=>{const p=[];let i=0;const re=/(\*\*(.+?)\*\*)|(\*(.+?)\*)|(`(.+?)`)/g;let m;
    while((m=re.exec(s))!==null){if(m.index>i)p.push(s.slice(i,m.index));if(m[1])p.push(React.createElement('strong',{key:i},m[2]));else if(m[3])p.push(React.createElement('em',{key:i},m[4]));else if(m[5])p.push(React.createElement('code',{key:i},m[6]));i=m.index+m[0].length}
    if(i<s.length)p.push(s.slice(i));return p.length===1&&typeof p[0]==='string'?p[0]:p};
  lines.forEach((ln,li)=>{
    if(/^#{1,4}\s/.test(ln)){flush();const lv=ln.match(/^(#{1,4})/)[1].length;out.push(React.createElement('h'+Math.min(lv+2,6),{key:li},inl(ln.replace(/^#{1,4}\s/,''))))}
    else if(/^>\s/.test(ln)){flush();out.push(React.createElement('blockquote',{key:li},inl(ln.replace(/^>\s/,''))))}
    else if(/^[-*•]\s/.test(ln)){bt='ul';buf.push(ln.replace(/^[-*•]\s/,''))}
    else if(/^\d+\.\s/.test(ln)){bt='ol';buf.push(ln.replace(/^\d+\.\s/,''))}
    else if(ln.trim()===''){flush()}
    else{flush();out.push(React.createElement('p',{key:li},inl(ln)))}
  });flush();return out;
}

function DonutChart({data,total}){
  if(!data.length||total===0)return null;
  const R=38,cx=50,cy=50,sw=11,circ=2*Math.PI*R;let off=0;
  const slices=data.map(({c,total:v})=>{const pct=v/total,dash=pct*circ;
    const el=React.createElement('circle',{key:c,cx,cy,r:R,fill:'none',stroke:CC[c],strokeWidth:sw,strokeDasharray:`${dash} ${circ-dash}`,strokeDashoffset:-(off*circ),style:{transform:'rotate(-90deg)',transformOrigin:'50% 50%'},title:`${c}: ${fmt(v)}`});
    off+=pct;return el;
  });
  return React.createElement('div',{className:'donut-wrap'},
    React.createElement('svg',{width:96,height:96,viewBox:'0 0 100 100'},
      React.createElement('circle',{cx,cy,r:R,fill:'none',stroke:'#1C2540',strokeWidth:sw}),
      ...slices,

function GoalsTab({goals,setGoals,savings}){
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({name:'',icon:'🎯',target:'',current:'',color:'#00C27C',deadline:''});
  const[depId,setDepId]=useState(null);
  const[depAmt,setDepAmt]=useState('');
  const add=()=>{if(!form.name||!form.target)return;setGoals(p=>[...p,{id:Date.now(),name:form.name,icon:form.icon,target:parseFloat(form.target),current:parseFloat(form.current)||0,color:form.color,deadline:form.deadline}]);setForm({name:'',icon:'🎯',target:'',current:'',color:'#00C27C',deadline:''});setShowForm(false)};
  const dep=id=>{const a=parseFloat(depAmt);if(!a||a<=0)return;setGoals(p=>p.map(g=>g.id===id?{...g,current:Math.min(g.target,g.current+a)}:g));setDepId(null);setDepAmt('')};
  const del=id=>setGoals(p=>p.filter(g=>g.id!==id));
  const mo=g=>savings>0&&g.current<g.target?Math.ceil((g.target-g.current)/savings):null;
  return React.createElement('div',{className:'panel'},
    React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}},
      React.createElement('div',{style:{fontSize:13,color:'var(--text2)'}},goals.length+' goal'+(goals.length!==1?'s':'')+' tracked'),
      React.createElement('button',{className:'add-btn',style:{padding:'7px 16px',fontSize:12},onClick:()=>setShowForm(s=>!s)},showForm?'✕ Cancel':'+ New Goal')
    ),
    showForm&&React.createElement('div',{className:'goal-form'},
      React.createElement('div',{className:'gform-title'},'Create Financial Goal'),
      React.createElement('div',{className:'gform-row'},
        React.createElement('select',{className:'in',value:form.icon,onChange:e=>setForm({...form,icon:e.target.value}),style:{width:72}},GICONS.map(ic=>React.createElement('option',{key:ic,value:ic},ic))),
        React.createElement('input',{className:'in',placeholder:'Goal name',style:{flex:1},value:form.name,onChange:e=>setForm({...form,name:e.target.value})})
      ),
      React.createElement('div',{className:'gform-row'},
        React.createElement('input',{className:'in',type:'number',placeholder:'Target ₹',style:{flex:1},value:form.target,onChange:e=>setForm({...form,target:e.target.value})}),
        React.createElement('input',{className:'in',type:'number',placeholder:'Saved so far ₹',style:{flex:1},value:form.current,onChange:e=>setForm({...form,current:e.target.value})}),
        React.createElement('input',{className:'in',type:'month',style:{flex:1},value:form.deadline,onChange:e=>setForm({...form,deadline:e.target.value})})
      ),
      React.createElement('div',{style:{display:'flex',gap:6,marginBottom:12,alignItems:'center',flexWrap:'wrap'}},
        React.createElement('span',{style:{fontSize:10,color:'var(--text3)',fontFamily:'var(--ff-mono)',marginRight:4}},'COLOR'),
        GCOLS.map(c=>React.createElement('div',{key:c,className:'cswatch'+(form.color===c?' sel':''),onClick:()=>setForm({...form,color:c}),style:{background:c}}))
      ),
      React.createElement('button',{className:'add-btn',onClick:add},'Create Goal')
    ),
    goals.length===0
      ?React.createElement('div',{style:{textAlign:'center',color:'var(--text3)',padding:'50px 20px',fontSize:'13px',lineHeight:'1.7'}},'No goals yet.',React.createElement('br'),'Create your first financial goal above!')
      :goals.map(g=>{
        const pct=Math.min(100,Math.round((g.current/g.target)*100)),done=g.current>=g.target,m=mo(g);
        return React.createElement('div',{key:g.id,className:'goal-card'},
          React.createElement('div',{className:'goal-header'},React.createElement('div',{className:'goal-icon'},g.icon),React.createElement('div',{className:'goal-name'},g.name),React.createElement('div',{className:'goal-pct',style:{color:done?'var(--green)':g.color}},done?'✓ Done!':pct+'%')),
          React.createElement('div',{className:'goal-bar'},React.createElement('div',{className:'goal-fill',style:{width:pct+'%',background:done?'var(--green)':g.color}})),
          React.createElement('div',{className:'goal-meta'},React.createElement('span',null,fmt(g.current)+' saved'),React.createElement('span',null,'Target: '+fmt(g.target))),
          !done&&React.createElement('div',{className:'goal-meta',style:{marginTop:4}},
            g.deadline&&React.createElement('span',null,'📅 '+g.deadline),
            m&&React.createElement('span',null,'⏱ ~'+m+' month'+(m!==1?'s':'')+' at current rate')
          ),
          React.createElement('div',{className:'goal-actions'},
            !done&&React.createElement('button',{className:'gadd-btn',onClick:()=>{setDepId(g.id===depId?null:g.id);setDepAmt('')}},depId===g.id?'Cancel':'+ Add Savings'),
            React.createElement('button',{className:'gdel-btn',onClick:()=>del(g.id)},'🗑 Delete')
          ),
          depId===g.id&&React.createElement('div',{style:{display:'flex',gap:8,marginTop:8}},
            React.createElement('input',{className:'in',type:'number',placeholder:'Amount ₹',style:{flex:1},value:depAmt,onChange:e=>setDepAmt(e.target.value),onKeyDown:e=>e.key==='Enter'&&dep(g.id)}),
            React.createElement('button',{className:'add-btn',style:{padding:'7px 16px',fontSize:12},onClick:()=>dep(g.id)},'Save')
          )
        );
      })
  );
}

function AnalyticsTab({expenses,income,totalExp,savings,catTotals}){
  const sP=income>0?Math.round((savings/income)*100):0;
  const eP=income>0?Math.round((totalExp/income)*100):0;
  const nd=catTotals.filter(x=>['Bills','Food','Transport','Health'].includes(x.c)).reduce((a,x)=>a+x.total,0);
  const wn=catTotals.filter(x=>['Shopping','Entertainment'].includes(x.c)).reduce((a,x)=>a+x.total,0);
  const maxC=catTotals.length?Math.max(...catTotals.map(x=>x.total)):1;
  const months=['Oct','Nov','Dec','Jan','Feb','Mar'];
  const trends=[6200,7100,9500,5900,7800,totalExp].map((v,i)=>({m:months[i],v}));
  const maxT=Math.max(...trends.map(x=>x.v),1);
  return React.createElement('div',{className:'panel'},
    React.createElement('div',{className:'agrid'},
      ...[
        {label:'Expense Ratio',val:eP+'%',color:eP>80?'var(--red)':eP>60?'var(--amber)':'var(--green)'},
        {label:'Savings Rate',val:sP+'%',color:sP>=20?'var(--green)':sP>=10?'var(--amber)':'var(--red)'},
        {label:'Needs / Income',val:income>0?Math.round((nd/income)*100)+'%':'—',color:'var(--blue)'},
        {label:'Wants / Income',val:income>0?Math.round((wn/income)*100)+'%':'—',color:'var(--amber)'},
      ].map(({label,val,color})=>React.createElement('div',{key:label,className:'stat-card'},
        React.createElement('div',{className:'stat-lbl'},label),React.createElement('div',{className:'stat-val',style:{color}},val)
      ))
    ),
    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'card-title'},'Spending by Category'),
      catTotals.length===0
        ?React.createElement('div',{style:{color:'var(--text3)',fontSize:13,textAlign:'center',padding:'20px 0'}},'No expenses logged yet.')
        :React.createElement('div',{style:{paddingTop:6}},
          catTotals.slice().sort((a,b)=>b.total-a.total).map(({c,total})=>
            React.createElement('div',{key:c,className:'bar-row'},
              React.createElement('div',{className:'bar-cat'},c),
              React.createElement('div',{className:'bar-track'},React.createElement('div',{className:'bar-fill',style:{width:((total/maxC)*100)+'%',background:CC[c]}})),
              React.createElement('div',{className:'bar-val'},fmt(total))
            )
          )
        )
    ),
    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'card-title'},'6-Month Spending Trend'),
      React.createElement('div',{className:'trend-wrap'},
        trends.map(({m,v})=>React.createElement('div',{key:m,className:'tcol'},
          React.createElement('div',{className:'tbar',style:{height:((v/maxT)*70)+'px',background:m==='Mar'?'var(--green)':'var(--border2)'}}),
          React.createElement('div',{className:'tlbl'},m)
        ))
      ),
      React.createElement('div',{style:{marginTop:8,fontSize:11,color:'var(--text3)',fontFamily:'var(--ff-mono)',textAlign:'right'}},
        'This month: '+fmt(totalExp)+(totalExp>7800?' ↑ higher':' ↓ lower')+' than last month'
      )
    ),
    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'card-title'},'Needs vs Wants vs Savings'),
      React.createElement('div',{style:{display:'flex',height:12,borderRadius:6,overflow:'hidden',marginBottom:10}},
        ...[{v:nd,c:'#4F8EF7'},{v:wn,c:'#F5A623'},{v:Math.max(0,savings),c:'#00C27C'}].map(({v,c},i)=>React.createElement('div',{key:i,style:{flex:v||0.001,background:c,transition:'flex .6s'}}))
      ),
      React.createElement('div',{style:{display:'flex',gap:16,flexWrap:'wrap'}},
        ...[{l:'Needs',v:nd,c:'#4F8EF7'},{l:'Wants',v:wn,c:'#F5A623'},{l:'Savings',v:Math.max(0,savings),c:'#00C27C'}].map(({l,v,c})=>
          React.createElement('div',{key:l,style:{display:'flex',alignItems:'center',gap:6}},
            React.createElement('div',{style:{width:8,height:8,borderRadius:'50%',background:c}}),
            React.createElement('span',{style:{fontSize:11,color:'var(--text2)'}},l+': '+fmt(v))
          )
        )
      )
    )
  );
}

/* ── Main App ── */
function App(){
  const[tab,setTab]         =useState('chat');
  const[apiKey,setApiKey]   =useState(()=>{try{return localStorage.getItem('fnv_or_key')||''}catch{return''}});
  const[showKey,setShowKey] =useState(false);
  const[streaming,setStreaming]=useState(false);
  const[income,setIncome]   =useState(()=>{try{return parseInt(localStorage.getItem('fnv_income')||'55000')||55000}catch{return 55000}});
  const[expenses,setExp]    =useState(()=>{try{return JSON.parse(localStorage.getItem('fnv_expenses'))||DEF_EXP}catch{return DEF_EXP}});
  const[goals,setGoals]     =useState(()=>{try{return JSON.parse(localStorage.getItem('fnv_goals'))||DEF_GOALS}catch{return DEF_GOALS}});
  const[msgs,setMsgs]       =useState([{role:'assistant',content:WELCOME}]);
  const[busy,setBusy]       =useState(false);

  useEffect(()=>{try{if(apiKey)localStorage.setItem('fnv_or_key',apiKey)}catch{}},[apiKey]);
  useEffect(()=>{try{localStorage.setItem('fnv_income',income)}catch{}},[income]);
  useEffect(()=>{try{localStorage.setItem('fnv_expenses',JSON.stringify(expenses))}catch{}},[expenses]);
  useEffect(()=>{try{localStorage.setItem('fnv_goals',JSON.stringify(goals))}catch{}},[goals]);

  const totalExp=expenses.reduce((s,e)=>s+e.amount,0);
  const savings=income-totalExp;
  const savPct=income>0?Math.round((savings/income)*100):0;
  const catTotals=CATS.map(c=>({c,total:expenses.filter(e=>e.category===c).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.total>0);
  const needs=expenses.filter(e=>['Bills','Food','Transport','Health'].includes(e.category)).reduce((s,e)=>s+e.amount,0);
  const wants=expenses.filter(e=>['Shopping','Entertainment'].includes(e.category)).reduce((s,e)=>s+e.amount,0);
  const hs=calcHealth(savPct,income,totalExp,catTotals);
  const{color:hc}=hGrade(hs);

  const handleSend=useCallback(async(text)=>{
    if(!apiKey){setShowKey(true);return}
    const hist=[...msgs,{role:'user',content:text}];
    setMsgs([...hist,{role:'assistant',content:''}]);
    setBusy(true);setStreaming(true);

    const ctx=getCtx(text);
    const gSnap=goals.map(g=>`${g.name}: ${fmt(g.current)}/${fmt(g.target)}`).join('; ')||'None set';
    const sys=`You are Finova, a professional AI Personal Finance Advisor specialising in Indian personal finance. Be concise, specific, and actionable. Use **bold** for key terms/amounts. Use bullet points for lists. Keep to 3-4 focused paragraphs.

KNOWLEDGE BASE:
${ctx}

USER FINANCIAL DATA:
Income: ${fmt(income)} | Expenses: ${fmt(totalExp)} | Savings: ${fmt(savings)} (${savPct}%)
Categories: ${catTotals.map(x=>x.c+': '+fmt(x.total)).join(', ')||'none'}
Goals: ${gSnap}
Health Score: ${hs}/100

Always use ₹ symbol. Reference tax sections (80C, 80D etc.) when relevant. Give advice specific to the user's actual numbers.`;

    // Build OpenRouter messages
    const messages=[{role:'system',content:sys}];
    for(let i=0;i<hist.length;i++){
      const m=hist[i];
      if(i===0&&m.role==='assistant')continue; // skip leading assistant
      messages.push({role:m.role,content:m.content||' '});
    }
    const model='nvidia/nemotron-3-super-120b-a12b:free';
    const payload={model,messages,stream:true,temperature:0.7,max_tokens:1200};

    let acc='';
    try{
      const res=await fetch(
        'https://openrouter.ai/api/v1/chat/completions',
        {method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`,'HTTP-Referer':window.location.href,'X-Title':'Finova'},body:JSON.stringify(payload)}
      );
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
      const reader=res.body.getReader(),dec=new TextDecoder();
      let buf='';
      while(true){
        const{done,value}=await reader.read();if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop()||'';
        for(const ln of lines){
          if(!ln.startsWith('data:'))continue;
          const raw=ln.slice(5).trim();if(!raw||raw==='[DONE]')continue;
          try{const p=JSON.parse(raw);const t=p?.choices?.[0]?.delta?.content||'';if(t){acc+=t;setMsgs([...hist,{role:'assistant',content:acc}])}}catch{}
        }
      }
      // flush remainder
      if(buf.startsWith('data:')){try{const p=JSON.parse(buf.slice(5).trim());const t=p?.choices?.[0]?.delta?.content||'';if(t){acc+=t;setMsgs([...hist,{role:'assistant',content:acc}])}}catch{}}
      if(!acc) throw new Error('Empty response received. Please try again.');
    }catch(err){
      let msg;
      const em=err.message||'';
      if(em.includes('Unauthorized')||em.includes('401'))
        msg='**Invalid API Key.** Your OpenRouter key appears incorrect. Click ⚙ in the header to update it. Keys start with `sk-or`.';
      else if(em.includes('429'))
        msg='**Rate limit reached.** Please wait a moment or check your credits on OpenRouter.';
      else if(em.includes('fetch')||em.includes('Failed to fetch')||em.includes('network'))
        msg='**Network error.** Could not reach the OpenRouter API. Please check your internet connection.';
      else
        msg=`**Error:** ${em}. Please verify your API key and try again.`;
      setMsgs([...hist,{role:'assistant',content:msg}]);
    }
    setBusy(false);setStreaming(false);
  },[msgs,apiKey,income,totalExp,savings,savPct,catTotals,goals,hs]);

  const saveKey=k=>{setApiKey(k);setShowKey(false)};
  const addExp=({desc,amount,category})=>setExp(p=>[...p,{id:Date.now(),desc,amount,category,date:new Date().toISOString().split('T')[0]}]);
  const delExp=id=>setExp(p=>p.filter(e=>e.id!==id));
  const TABS=[['chat','💬 Chat'],['expenses','📊 Expenses'],['budget','🎯 Budget'],['goals','🏆 Goals'],['analytics','📈 Analytics']];

  return React.createElement('div',{id:'root'},
    (!apiKey||showKey)&&React.createElement(KeyModal,{onSave:saveKey,onClose:apiKey?()=>setShowKey(false):null}),

    React.createElement('div',{className:'header'},
      React.createElement('div',{className:'logo'},
        React.createElement('div',{className:'logo-mark'},'₹'),
        React.createElement('div',{className:'logo-name'},'Finova',React.createElement('span',null,' AI'))
      ),
      React.createElement('div',{className:'header-right'},
        React.createElement('div',{className:'badge badge-green'},'RAG Active'),
        React.createElement('div',{className:'badge-gemini'},React.createElement(GDots),'OpenRouter / Nemotron'),
        React.createElement('div',{className:'health-badge',style:{color:hc,borderColor:hc+'44',background:hc+'11'}},'♥ '+hs+'/100'),
        React.createElement('button',{className:'cog-btn',title:'Configure API Key',onClick:()=>setShowKey(true)},'⚙')
      )
    ),

    React.createElement('div',{className:'tabs'},
      TABS.map(([id,label])=>React.createElement('div',{key:id,className:'tab'+(tab===id?' active':''),onClick:()=>setTab(id)},label))
    ),

    React.createElement('div',{className:'body'},
      React.createElement(Sidebar,{income,totalExp,savings,savPct,catTotals,healthScore:hs}),
      tab==='chat'     &&React.createElement(ChatTab,{msgs,busy,streaming,apiKey,onOpenKey:()=>setShowKey(true),onSend:handleSend}),
      tab==='expenses' &&React.createElement(ExpensesTab,{expenses,totalExp,onAdd:addExp,onDelete:delExp}),
      tab==='budget'   &&React.createElement(BudgetTab,{income,setIncome,needs,wants,savings}),
      tab==='goals'    &&React.createElement(GoalsTab,{goals,setGoals,savings}),
      tab==='analytics'&&React.createElement(AnalyticsTab,{expenses,income,totalExp,savings,catTotals})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
